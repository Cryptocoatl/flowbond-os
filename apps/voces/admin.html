<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Panel · Voces para el Alma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --lino:#F7F2E9; --pergamino:#FCFAF4; --oro:#B68A3E; --oro-claro:#CBA15A;
    --salvia:#7E9078; --salvia-tenue:#E5EAE0; --pizarra:#4C6072; --tinta:#2C2722;
    --tinta-60:rgba(44,39,34,.62); --linea:rgba(44,39,34,.14);
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif; --r:14px;
    --ok:#3f7d59; --warn:#b5762a; --bad:#a4493e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--tinta);background:var(--lino);line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:400;letter-spacing:-.01em}
  a{color:var(--pizarra)}
  button{font-family:var(--sans);cursor:pointer}
  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:500;font-size:14px;padding:9px 16px;border-radius:100px;border:1px solid transparent;transition:.2s}
  .btn-primary{background:var(--tinta);color:var(--lino)}
  .btn-primary:hover{background:var(--oro)}
  .btn-ghost{background:transparent;color:var(--tinta);border:1px solid var(--linea)}
  .btn-ghost:hover{border-color:var(--tinta)}
  .btn-sm{padding:6px 12px;font-size:13px}
  input,select,textarea{font-family:var(--sans);font-size:14px;color:var(--tinta);background:var(--pergamino);
    border:1px solid var(--linea);border-radius:10px;padding:10px 12px;width:100%}
  textarea{min-height:80px;resize:vertical}
  label{display:block;font-size:12px;font-weight:600;color:var(--tinta-60);margin:0 0 5px}
  :focus-visible{outline:2px solid var(--oro);outline-offset:2px}

  /* LOGIN */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--pergamino);border:1px solid var(--linea);border-radius:22px;padding:40px;max-width:420px;width:100%;text-align:center}
  .login-card h1{font-size:28px;margin:14px 0 6px}
  .login-card p{color:var(--tinta-60);font-size:14px;margin-bottom:22px}
  .login-card form{display:flex;flex-direction:column;gap:12px;text-align:left}
  .ring{display:inline-flex}
  .msg{margin-top:14px;font-size:13.5px;min-height:18px}

  /* APP */
  #app{display:none;min-height:100vh}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;
    height:62px;padding:0 22px;background:rgba(247,242,233,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--linea)}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:18px}
  .top-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--tinta-60)}
  .layout{display:flex;align-items:flex-start;max-width:1240px;margin:0 auto;width:100%}
  .nav{position:sticky;top:62px;flex:none;width:210px;padding:22px 14px;height:calc(100vh - 62px);overflow:auto}
  .nav button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 12px;border-radius:10px;
    font-size:14.5px;color:var(--tinta-60);font-weight:500}
  .nav button:hover{background:rgba(44,39,34,.05);color:var(--tinta)}
  .nav button.active{background:var(--tinta);color:var(--lino)}
  .main{flex:1;min-width:0;padding:26px 26px 80px}
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .sec-head h2{font-size:24px}
  .hint{color:var(--tinta-60);font-size:13.5px;margin:-6px 0 18px;max-width:62ch}

  .card{background:var(--pergamino);border:1px solid var(--linea);border-radius:var(--r);padding:14px 16px;margin-bottom:11px;
    display:flex;align-items:center;gap:14px}
  .card .grow{flex:1;min-width:0}
  .card h4{font-size:16px;margin-bottom:2px}
  .card .meta{font-size:12.5px;color:var(--tinta-60)}
  .card .acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.04em}
  .pill.published{background:#e3efe7;color:var(--ok)}
  .pill.pending,.pill.draft{background:#f4e9d8;color:var(--warn)}
  .pill.verified{background:#e6eef4;color:var(--pizarra)}
  .pill.hidden{background:#f3e2df;color:var(--bad)}
  .thumb{width:46px;height:46px;border-radius:10px;background:var(--salvia-tenue) center/cover no-repeat;flex:none}

  /* DRAWER FORM */
  .drawer-bg{position:fixed;inset:0;background:rgba(44,39,34,.42);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .drawer-bg.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,100%);background:var(--lino);z-index:41;
    transform:translateX(102%);transition:.3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--linea)}
  .drawer-head h3{font-size:20px}
  .drawer-body{flex:1;overflow:auto;padding:20px 22px}
  .drawer-foot{padding:16px 22px;border-top:1px solid var(--linea);display:flex;gap:10px;justify-content:flex-end}
  .field{margin-bottom:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .chk{display:flex;align-items:center;gap:8px}
  .chk input{width:auto}
  .chkgroup{display:flex;gap:14px;flex-wrap:wrap}
  .bi{font-size:11px;color:var(--oro);font-weight:600;text-transform:uppercase;letter-spacing:.08em}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--tinta);color:var(--lino);
    padding:12px 20px;border-radius:100px;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%)}
  .empty{color:var(--tinta-60);font-size:14px;padding:30px;text-align:center;border:1px dashed var(--linea);border-radius:var(--r)}
  @media(max-width:760px){ .nav{position:static;width:100%;height:auto;display:flex;gap:6px;overflow:auto;border-bottom:1px solid var(--linea)}
    .layout{flex-direction:column}.row2{grid-template-columns:1fr} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <span class="ring"><svg width="46" height="46" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="15.5" stroke="#CBA15A" stroke-width="1"/><circle cx="17" cy="17" r="10.5" stroke="#7E9078" stroke-width="1"/><circle cx="17" cy="17" r="4.6" fill="#B68A3E"/></svg></span>
    <h1>Panel · Voces para el Alma</h1>
    <p>Administración de contenido. Acceso solo para el equipo autorizado.</p>
    <form onsubmit="loginPassword(event)">
      <div style="text-align:left"><label>Correo electrónico</label><input id="loginEmail" type="email" required placeholder="tu@correo.com" autocomplete="username"></div>
      <div style="text-align:left"><label>Contraseña</label><input id="loginPasswordInput" type="password" required placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-primary" type="submit" style="justify-content:center;width:100%;margin-top:12px">Entrar</button>
    </form>
    <details style="margin-top:14px;text-align:left">
      <summary style="cursor:pointer;color:var(--tinta-60);font-size:13px;text-align:center">¿Olvidaste tu contraseña? Recibir enlace por correo</summary>
      <form onsubmit="sendLink(event)" style="margin-top:10px">
        <button class="btn btn-ghost" type="submit" style="justify-content:center;width:100%">Enviar enlace de acceso</button>
      </form>
    </details>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="15.5" stroke="#CBA15A" stroke-width="1"/><circle cx="17" cy="17" r="10.5" stroke="#7E9078" stroke-width="1"/><circle cx="17" cy="17" r="4.6" fill="#B68A3E"/></svg>
      <span>Voces · Panel</span>
    </div>
    <div class="top-right">
      <a href="/" target="_blank">Ver sitio ↗</a>
      <span id="whoami"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="layout">
    <nav class="nav" id="nav"></nav>
    <main class="main" id="main"></main>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><h3 id="drawerTitle">Editar</h3>
    <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">Cerrar</button></div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot">
    <button class="btn btn-ghost" onclick="closeDrawer()">Cancelar</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveForm()">Guardar</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL="https://fgsrcxxccdjqyrpkitmk.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnc3JjeHhjY2RqcXlycGtpdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDcxNzQsImV4cCI6MjA5MjEyMzE3NH0.vE20bvXPaLR8uaBUgVlwKwaoQgETfWcNIVpswgEj6xk";
// detectSessionInUrl:false → consumeAuthFromUrl() is the single authority that
// redeems the URL (token_hash / code), so there's no double-exchange race.
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{ detectSessionInUrl:false, persistSession:true, autoRefreshToken:true } });

let CATS = [];          // categories cache (for selects)
let SPECS = [];         // specialists cache (for selects)
let current = { entity:null, item:null, cfg:null };

const $ = id => document.getElementById(id);
let toastTimer;
function toast(m){ const e=$("toast"); e.textContent=m; e.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>e.classList.remove("show"),2800); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const STATUS_PUB = ["published","hidden","pending","draft"];
const STATUS_SPEC = ["published","verified","pending","hidden"];
const MOD = ["presencial","online","hibrido"];

/* ============ AUTH ============ */
// Primary path: email + password, no email round-trip, no hub. Instant.
async function loginPassword(e){
  e.preventDefault();
  const email=$("loginEmail").value.trim(), password=$("loginPasswordInput").value;
  $("loginMsg").style.color="";
  $("loginMsg").textContent="Entrando…";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $("loginMsg").style.color="var(--bad)"; $("loginMsg").textContent="Error: "+error.message; return; }
  $("loginMsg").textContent="";
  await boot();
}
// Fallback: same-origin magic-link (no FBID hub). Lands back here on /admin.
async function sendLink(e){
  e.preventDefault();
  const email=$("loginEmail").value.trim();
  $("loginMsg").textContent="Enviando…";
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.origin + "/admin" } });
  $("loginMsg").style.color = error ? "var(--bad)" : "var(--ok)";
  $("loginMsg").textContent = error ? ("Error: "+error.message) : "Revisa tu correo y abre el enlace de acceso.";
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

// Redeem whatever the email-link auth flow left in the URL, then clean it up.
// Shapes handled: ?code= (PKCE email link), #access_token=… (implicit —
// auto-detected by supabase-js), #error=… (expired/used link).
async function consumeAuthFromUrl(){
  const q = new URLSearchParams(location.search);
  const h = new URLSearchParams(location.hash.replace(/^#/, ""));
  const errDesc = q.get("error_description") || h.get("error_description") || q.get("error") || h.get("error");
  const code = q.get("code");
  const clean = () => history.replaceState({}, "", location.origin + "/admin");

  if(errDesc){ clean(); return { error: decodeURIComponent(errDesc.replace(/\+/g," ")) }; }
  try{
    if(code){ const { error } = await sb.auth.exchangeCodeForSession(code); clean(); if(error) return { error: error.message }; }
    else if(location.hash.includes("access_token")){ clean(); } // supabase-js detectSessionInUrl already stored it
  }catch(e){ clean(); return { error: e.message }; }
  return {};
}

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $("login").style.display="flex"; $("app").style.display="none"; return; }
  // ensure member row then check role
  let role="visitor";
  try{ const { data } = await sb.rpc("vpa_ensure_member",{ p_locale:"es" }); role=data||"visitor"; }
  catch(_){ try{ const { data } = await sb.rpc("vpa_my_role"); role=data||"visitor"; }catch(__){} }
  if(role!=="super_admin"){
    $("login").style.display="flex";
    $("login").innerHTML='<div class="login-card"><h1>Acceso restringido</h1><p>Tu cuenta ('+esc(session.user.email)+') no tiene permisos de administración. Pide a un super admin que te otorgue acceso.</p><button class="btn btn-ghost" onclick="logout()">Salir</button></div>';
    return;
  }
  $("login").style.display="none"; $("app").style.display="block";
  $("whoami").textContent = session.user.email;
  buildNav();
  await preload();
  go("specialists");
}
sb.auth.onAuthStateChange((_e,_s)=>{});

/* ============ NAV ============ */
const SECTIONS = [
  ["specialists","Especialistas"],["categories","Categorías"],["workshops","Talleres"],
  ["products","Tienda"],["testimonials","Testimonios"],["inquiries","Postulaciones"],
  ["members","Miembros"],["settings","Inicio / Contacto"]
];
function buildNav(){
  $("nav").innerHTML = SECTIONS.map(([k,l])=>`<button data-sec="${k}" onclick="go('${k}')">${l}</button>`).join("");
}
let section="specialists";
function go(sec){
  section=sec;
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.sec===sec));
  RENDER[sec]();
}

async function preload(){
  const c = await sb.from("app_vpa_categories").select("*").order("sort_order");
  CATS = c.data||[];
  const s = await sb.from("app_vpa_specialists").select("id,name").order("sort_order");
  SPECS = s.data||[];
}
function catName(id){ const c=CATS.find(x=>x.id===id); return c?c.name_es:"—"; }
function specName(id){ const s=SPECS.find(x=>x.id===id); return s?s.name:"—"; }

/* ============ ENTITY CONFIGS ============ */
function catOptions(extra){ return (extra?[["","— sin asignar —"]]:[]).concat(CATS.map(c=>[c.id,c.name_es])); }
function specOptions(){ return [["","— Plataforma —"]].concat(SPECS.map(s=>[s.id,s.name])); }

const CFG = {
  specialists:{
    title:"especialista", table:"app_vpa_specialists", rpc:"vpa_upsert_specialist", order:"sort_order",
    fields:()=>[
      {k:"name",t:"text",l:"Nombre",req:true},
      {k:"category_id",t:"select",l:"Categoría",opts:catOptions()},
      {k:"status",t:"select",l:"Estado",opts:STATUS_SPEC.map(s=>[s,s])},
      {k:"role_es",t:"text",l:"Rol / título",bi:"es"},{k:"role_en",t:"text",l:"Role / title",bi:"en"},
      {k:"bio_es",t:"textarea",l:"Biografía",bi:"es"},{k:"bio_en",t:"textarea",l:"Bio",bi:"en"},
      {k:"focus_es",t:"text",l:"Áreas de enfoque (separadas por coma)",bi:"es",arr:true},
      {k:"focus_en",t:"text",l:"Focus areas (comma separated)",bi:"en",arr:true},
      {k:"certs_es",t:"text",l:"Certificaciones",bi:"es"},{k:"certs_en",t:"text",l:"Credentials",bi:"en"},
      {k:"photo_url",t:"text",l:"Foto (URL o token Unsplash photo-xxxx)"},
      {k:"langs",t:"chkgroup",l:"Idiomas",opts:[["es","ES"],["en","EN"]]},
      {k:"modalities",t:"chkgroup",l:"Modalidades",opts:MOD.map(m=>[m,m])},
      {k:"available_now",t:"chk",l:"Disponible ahora"},
      {k:"contact_email",t:"text",l:"Correo de contacto (privado, se revela con login)"},
      {k:"contact_phone",t:"text",l:"Teléfono / WhatsApp (privado)"},
      {k:"contact_web",t:"text",l:"Sitio web (privado)"},
      {k:"sort_order",t:"number",l:"Orden"}
    ],
    list:i=>({thumb:i.photo_url,title:i.name,meta:(i.role_es||"")+" · "+catName(i.category_id),status:i.status}),
    statusRpc:(id,st)=>sb.rpc("vpa_set_specialist_status",{p_id:id,p_status:st}), statusOpts:STATUS_SPEC
  },
  categories:{
    title:"categoría", table:"app_vpa_categories", rpc:"vpa_upsert_category", order:"sort_order",
    fields:()=>[
      {k:"name_es",t:"text",l:"Nombre",bi:"es",req:true},{k:"name_en",t:"text",l:"Name",bi:"en",req:true},
      {k:"slug",t:"text",l:"Slug (único, sin espacios)",req:true},
      {k:"desc_es",t:"textarea",l:"Descripción",bi:"es"},{k:"desc_en",t:"textarea",l:"Description",bi:"en"},
      {k:"icon",t:"textarea",l:"Ícono (contenido SVG: <path …/>)"},
      {k:"sort_order",t:"number",l:"Orden"},
      {k:"status",t:"select",l:"Estado",opts:[["published","published"],["hidden","hidden"]]}
    ],
    list:i=>({title:i.name_es,meta:i.slug,status:i.status}),
    statusRpc:(id,st)=>sb.rpc("vpa_set_status",{p_entity:"category",p_id:id,p_status:st}), statusOpts:["published","hidden"]
  },
  workshops:{
    title:"taller", table:"app_vpa_workshops", rpc:"vpa_upsert_workshop", order:"starts_at",
    fields:()=>[
      {k:"title_es",t:"text",l:"Título",bi:"es",req:true},{k:"title_en",t:"text",l:"Title",bi:"en",req:true},
      {k:"specialist_id",t:"select",l:"Especialista (imparte)",opts:specOptions()},
      {k:"desc_es",t:"textarea",l:"Descripción",bi:"es"},{k:"desc_en",t:"textarea",l:"Description",bi:"en"},
      {k:"starts_at",t:"datetime",l:"Fecha y hora de inicio",req:true},
      {k:"ends_at",t:"datetime",l:"Fin (opcional, retiros)"},
      {k:"location",t:"text",l:"Sede / lugar"},
      {k:"is_retreat",t:"chk",l:"Es retiro"},
      {k:"modality",t:"select",l:"Modalidad",opts:MOD.map(m=>[m,m])},
      {k:"price_mxn",t:"number",l:"Precio (MXN)"},
      {k:"capacity",t:"number",l:"Cupo"},
      {k:"cover_url",t:"text",l:"Imagen (URL o token)"},
      {k:"status",t:"select",l:"Estado",opts:[["published","published"],["hidden","hidden"],["draft","draft"]]}
    ],
    list:i=>({thumb:i.cover_url,title:i.title_es,meta:specName(i.specialist_id)+" · "+new Date(i.starts_at).toLocaleString("es-MX")+" · $"+(i.price_cents/100)+" MXN",status:i.status}),
    statusRpc:(id,st)=>sb.rpc("vpa_set_status",{p_entity:"workshop",p_id:id,p_status:st}), statusOpts:["published","hidden"]
  },
  products:{
    title:"producto", table:"app_vpa_products", rpc:"vpa_upsert_product", order:"created_at",
    fields:()=>[
      {k:"title_es",t:"text",l:"Título",bi:"es",req:true},{k:"title_en",t:"text",l:"Title",bi:"en",req:true},
      {k:"specialist_id",t:"select",l:"Autor",opts:specOptions()},
      {k:"desc_es",t:"textarea",l:"Descripción",bi:"es"},{k:"desc_en",t:"textarea",l:"Description",bi:"en"},
      {k:"type_es",t:"text",l:"Tipo (Ebook/Audio/Curso/Guía)",bi:"es"},{k:"type_en",t:"text",l:"Type",bi:"en"},
      {k:"price_mxn",t:"number",l:"Precio (MXN)"},
      {k:"cover_url",t:"text",l:"Portada (URL o token)"},
      {k:"network_shareable",t:"chk",l:"Compartible en la red (FlowShare)"},
      {k:"status",t:"select",l:"Estado",opts:[["published","published"],["hidden","hidden"],["draft","draft"]]}
    ],
    list:i=>({thumb:i.cover_url,title:i.title_es,meta:(i.type_es||"")+" · $"+(i.price_cents/100)+" MXN",status:i.status}),
    statusRpc:(id,st)=>sb.rpc("vpa_set_status",{p_entity:"product",p_id:id,p_status:st}), statusOpts:["published","hidden"]
  },
  testimonials:{
    title:"testimonio", table:"app_vpa_testimonials", rpc:"vpa_upsert_testimonial", order:"sort_order",
    fields:()=>[
      {k:"quote_es",t:"textarea",l:"Cita",bi:"es",req:true},{k:"quote_en",t:"textarea",l:"Quote",bi:"en",req:true},
      {k:"author",t:"text",l:"Autor",req:true},
      {k:"loc_es",t:"text",l:"Lugar / rol",bi:"es"},{k:"loc_en",t:"text",l:"Location / role",bi:"en"},
      {k:"avatar_url",t:"text",l:"Foto (URL o token)"},
      {k:"sort_order",t:"number",l:"Orden"},
      {k:"status",t:"select",l:"Estado",opts:[["published","published"],["hidden","hidden"]]}
    ],
    list:i=>({thumb:i.avatar_url,title:i.author,meta:(i.quote_es||"").slice(0,70)+"…",status:i.status}),
    statusRpc:(id,st)=>sb.rpc("vpa_set_status",{p_entity:"testimonial",p_id:id,p_status:st}), statusOpts:["published","hidden"]
  }
};

/* ============ GENERIC LIST RENDER ============ */
const RENDER = {};
["specialists","categories","workshops","products","testimonials"].forEach(sec=>{
  RENDER[sec]=async ()=>{
    const cfg=CFG[sec];
    $("main").innerHTML=`<div class="sec-head"><h2>${labelOf(sec)}</h2>
      <button class="btn btn-primary" onclick="openForm('${sec}')">+ Nuevo</button></div>
      <div class="hint">${hintOf(sec)}</div><div id="rows"><div class="empty">Cargando…</div></div>`;
    const { data, error } = await sb.from(cfg.table).select("*").order(cfg.order,{ascending:true});
    if(error){ $("rows").innerHTML=`<div class="empty">Error: ${esc(error.message)}</div>`; return; }
    if(sec==="categories") CATS=data; if(sec==="specialists") SPECS=data.map(d=>({id:d.id,name:d.name}));
    if(!data.length){ $("rows").innerHTML=`<div class="empty">Aún no hay ${cfg.title}s. Crea el primero.</div>`; return; }
    $("rows").innerHTML=data.map(i=>{
      const v=cfg.list(i); const img=v.thumb?`style="background-image:url('${imgUrl(v.thumb)}')"`:"";
      const stOpts=cfg.statusOpts.map(s=>`<option ${s===v.status?"selected":""}>${s}</option>`).join("");
      return `<div class="card">
        <div class="thumb" ${img}></div>
        <div class="grow"><h4>${esc(v.title)}</h4><div class="meta">${esc(v.meta)}</div></div>
        <div class="acts">
          <span class="pill ${v.status}">${v.status}</span>
          <select class="btn-sm" style="padding:6px;border-radius:8px" onchange="quickStatus('${sec}','${i.id}',this.value)">${stOpts}</select>
          <button class="btn btn-ghost btn-sm" onclick='openForm("${sec}", ${JSON.stringify(i).replace(/'/g,"&#39;")})'>Editar</button>
        </div></div>`;
    }).join("");
  };
});
function labelOf(sec){ return (SECTIONS.find(s=>s[0]===sec)||["",sec])[1]; }
function hintOf(sec){ return ({
  specialists:"Crea y edita las voces del directorio. Solo los 'published' se ven en el sitio. El correo/teléfono son privados y se revelan a quien inicia sesión.",
  categories:"Las ocho disciplinas. Edita nombres, descripciones e íconos.",
  workshops:"Talleres y retiros. Define fecha, modalidad, precio y especialista.",
  products:"Tienda de contenidos digitales (ebooks, audios, cursos, guías).",
  testimonials:"Historias de personas que se transformaron.",
}[sec]||""); }
function imgUrl(n){ return !n?"":(String(n).startsWith("http")?n:`https://images.unsplash.com/${n}?auto=format&fit=crop&w=120&q=60`); }

async function quickStatus(sec,id,st){
  try{ const { error }=await CFG[sec].statusRpc(id,st); if(error) throw error; toast("Estado actualizado"); RENDER[sec](); }
  catch(e){ toast("Error: "+e.message); }
}

/* ============ FORM (drawer) ============ */
function openForm(sec,item){
  const cfg=CFG[sec]; current={entity:sec,item:item||null,cfg};
  $("drawerTitle").textContent=(item?"Editar ":"Nuevo ")+cfg.title;
  const f=cfg.fields();
  $("drawerBody").innerHTML=f.map(fd=>fieldHtml(fd,item?item[fd.k]:undefined)).join("");
  openDrawer();
}
function fieldHtml(fd,val){
  const id="f_"+fd.k; const bi=fd.bi?`<span class="bi">${fd.bi}</span> `:"";
  let inner="";
  if(fd.t==="textarea") inner=`<textarea id="${id}">${esc(val||"")}</textarea>`;
  else if(fd.t==="number") inner=`<input id="${id}" type="number" value="${val!=null?esc(val):""}">`;
  else if(fd.t==="datetime") inner=`<input id="${id}" type="datetime-local" value="${toLocalInput(val)}">`;
  else if(fd.t==="select") inner=`<select id="${id}">${fd.opts.map(o=>`<option value="${esc(o[0])}" ${String(val)===String(o[0])?"selected":""}>${esc(o[1])}</option>`).join("")}</select>`;
  else if(fd.t==="chk") return `<div class="field"><label class="chk"><input id="${id}" type="checkbox" ${val?"checked":""}> ${esc(fd.l)}</label></div>`;
  else if(fd.t==="chkgroup"){
    const arr=Array.isArray(val)?val:[];
    return `<div class="field"><label>${esc(fd.l)}</label><div class="chkgroup">${fd.opts.map(o=>`<label class="chk"><input type="checkbox" data-grp="${fd.k}" value="${o[0]}" ${arr.includes(o[0])?"checked":""}> ${esc(o[1])}</label>`).join("")}</div></div>`;
  }
  else { // text, arr
    const v=fd.arr&&Array.isArray(val)?val.join(", "):(val!=null?val:"");
    inner=`<input id="${id}" type="text" value="${esc(v)}">`;
  }
  return `<div class="field"><label>${bi}${esc(fd.l)}${fd.req?" *":""}</label>${inner}</div>`;
}
function collect(){
  const cfg=current.cfg; const p={};
  if(current.item&&current.item.id) p.id=current.item.id;
  cfg.fields().forEach(fd=>{
    if(fd.t==="chk"){ p[fd.k]=$("f_"+fd.k).checked; return; }
    if(fd.t==="chkgroup"){ p[fd.k]=[...document.querySelectorAll(`[data-grp="${fd.k}"]:checked`)].map(e=>e.value); return; }
    const el=$("f_"+fd.k); if(!el) return; let v=el.value;
    if(fd.t==="datetime"){ p[fd.k]= v? new Date(v).toISOString() : ""; return; }
    if(fd.arr){ p[fd.k]= v.split(",").map(x=>x.trim()).filter(Boolean); return; }
    if(fd.t==="number"){ p[fd.k]= v===""?null:Number(v); return; }
    p[fd.k]=v;
  });
  // price_mxn -> price_cents
  if("price_mxn" in p){ p.price_cents = Math.round((Number(p.price_mxn)||0)*100); delete p.price_mxn; }
  return p;
}
async function saveForm(){
  const cfg=current.cfg; const payload=collect();
  $("saveBtn").disabled=true; $("saveBtn").textContent="Guardando…";
  try{
    const { error } = await sb.rpc(cfg.rpc,{ payload });
    if(error) throw error;
    toast("Guardado"); closeDrawer(); await preload(); RENDER[current.entity]();
  }catch(e){ toast("Error: "+e.message); }
  finally{ $("saveBtn").disabled=false; $("saveBtn").textContent="Guardar"; }
}
function openDrawer(){ $("drawer").classList.add("open"); $("drawerBg").classList.add("open"); }
function closeDrawer(){ $("drawer").classList.remove("open"); $("drawerBg").classList.remove("open"); }
function toLocalInput(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return ""; const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ============ INQUIRIES ============ */
RENDER.inquiries=async ()=>{
  $("main").innerHTML=`<div class="sec-head"><h2>Postulaciones y mensajes</h2></div>
    <div class="hint">Mensajes de contacto y postulaciones de especialistas. Puedes marcarlos como atendidos o convertir una postulación en perfil de especialista (borrador).</div>
    <div id="rows"><div class="empty">Cargando…</div></div>`;
  const { data, error } = await sb.from("app_vpa_inquiries").select("*").order("created_at",{ascending:false});
  if(error){ $("rows").innerHTML=`<div class="empty">Error: ${esc(error.message)}</div>`; return; }
  if(!data.length){ $("rows").innerHTML=`<div class="empty">Sin mensajes todavía.</div>`; return; }
  $("rows").innerHTML=data.map(i=>{
    const isApp=i.kind==="specialist_application";
    const catSel=`<select id="pc_${i.id}" class="btn-sm" style="padding:6px;border-radius:8px">${CATS.map(c=>`<option value="${c.id}">${esc(c.name_es)}</option>`).join("")}</select>`;
    return `<div class="card"><div class="grow">
      <h4>${esc(i.name)} ${isApp?'<span class="pill verified">postulación</span>':''} ${i.handled?'<span class="pill published">atendido</span>':''}</h4>
      <div class="meta">${esc(i.email)}${i.discipline?" · "+esc(i.discipline):""} · ${new Date(i.created_at).toLocaleString("es-MX")}</div>
      <div class="meta" style="margin-top:6px;color:var(--tinta)">${esc(i.message)}</div></div>
      <div class="acts">
        ${isApp?catSel+`<button class="btn btn-ghost btn-sm" onclick="promote('${i.id}')">Promover</button>`:""}
        <button class="btn btn-ghost btn-sm" onclick="handleInq('${i.id}',${!i.handled})">${i.handled?"Reabrir":"Atendido"}</button>
      </div></div>`;
  }).join("");
};
async function handleInq(id,h){ try{ const {error}=await sb.rpc("vpa_handle_inquiry",{p_id:id,p_handled:h}); if(error)throw error; toast("Listo"); RENDER.inquiries(); }catch(e){ toast("Error: "+e.message);} }
async function promote(id){ const cat=$("pc_"+id).value; try{ const {error}=await sb.rpc("vpa_promote_inquiry",{p_id:id,p_category_id:cat}); if(error)throw error; toast("Perfil borrador creado en Especialistas"); await preload(); RENDER.inquiries(); }catch(e){ toast("Error: "+e.message);} }

/* ============ MEMBERS ============ */

    <div class="hint">Otorga roles por FBID. <b>super_admin</b> = control total · <b>specialist</b> = edita su propio perfil/talleres · <b>visitor</b> = sin permisos. (Para encontrar el FBID de una persona, pídele que inicie sesión una vez en el sitio.)</div>

      <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="grantRole()">Otorgar</button>
    </div>
    <div id="rows"><div class="empty">Cargando…</div></div>`;

  $("rows").innerHTML=(data||[]).map(m=>`<div class="card"><div class="grow">
      <h4 style="font-family:var(--sans);font-size:14px">${esc(m.fbid_user)}</h4>
      <div class="meta">suscripción: ${esc(m.subscription_status)} · desde ${new Date(m.created_at).toLocaleDateString("es-MX")}</div></div>

async function setRole(fbid,role){ try{ const {error}=await sb.rpc("vpa_set_member_role",{p_fbid:fbid,p_role:role}); if(error)throw error; toast("Rol actualizado"); }catch(e){ toast("Error: "+e.message);} }
async function grantRole(){ const fbid=$("newFbid").value.trim(),role=$("newRole").value; if(!fbid)return toast("Ingresa un FBID");
  try{ const {error}=await sb.rpc("vpa_set_member_role",{p_fbid:fbid,p_role:role}); if(error)throw error; toast("Rol otorgado"); RENDER.members(); }catch(e){ toast("Error: "+e.message);} }

  }
  await boot();
})();
